<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentForge · ABAC 权限配置</title>
<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
<style>
:root {
    --bg: #f6f8fa;
    --bg-secondary: #ffffff;
    --card: #ffffff;
    --border: #d0d7de;
    --border-soft: #d0d7de66;
    --text: #1f2328;
    --text-secondary: #656d76;
    --text-muted: #8b949e;
    --accent-blue: #0969da;
    --accent-green: #1a7f37;
    --accent-orange: #bf8700;
    --accent-red: #cf222e;
    --accent-purple: #8250df;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 14px; }
.container { max-width: 1600px; margin: 0 auto; padding: 20px; }

/* Header */
.header { padding: 20px 0 16px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
.header h1 { font-size: 1.5rem; display: flex; align-items: center; gap: 10px; }
.header h1 i { color: var(--accent-blue); }
.header p { color: var(--text-secondary); margin-top: 6px; font-size: 0.9rem; }

/* Layout */
.main-layout { display: grid; grid-template-columns: 200px 1fr 360px; gap: 16px; }

/* Sidebar */
.sidebar { position: sticky; top: 20px; height: fit-content; }
.sidebar-title { font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 10px; padding: 0 8px; }
.resource-item { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-radius: 8px; cursor: pointer; transition: all 0.15s; color: var(--text-secondary); font-size: 0.9rem; }
.resource-item:hover { background: rgba(0,0,0,0.04); color: var(--text); }
.resource-item.active { background: rgba(9,105,218,0.1); color: var(--accent-blue); font-weight: 500; }
.resource-item i { font-size: 1.1rem; width: 20px; text-align: center; }
.resource-count { margin-left: auto; background: var(--border); color: var(--text-secondary); padding: 1px 8px; border-radius: 10px; font-size: 0.75rem; }

/* Table */
.table-wrapper { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.table-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--border); }
.table-title { font-weight: 600; font-size: 1rem; }
.table { width: 100%; border-collapse: collapse; }
.table th { padding: 10px 14px; text-align: left; font-size: 0.8rem; color: var(--text-muted); border-bottom: 1px solid var(--border); background: var(--bg); font-weight: 500; white-space: nowrap; }
.table td { padding: 12px 14px; border-bottom: 1px solid var(--border-soft); font-size: 0.85rem; vertical-align: top; }
.table tr:hover { background: rgba(9,105,218,0.02); }
.table tr.selected { background: rgba(9,105,218,0.06); }
.table tr { cursor: pointer; }

/* Tags */
.tag { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: 500; }
.tag-allow { background: rgba(26,127,55,0.1); color: var(--accent-green); }
.tag-deny { background: rgba(208,34,46,0.1); color: var(--accent-red); }
.tag-approval { background: rgba(191,135,0,0.1); color: var(--accent-orange); }
.tag-wf { background: rgba(9,105,218,0.1); color: var(--accent-blue); }
.tag-skill { background: rgba(130,80,223,0.1); color: var(--accent-purple); }
.tag-ds { background: rgba(191,135,0,0.1); color: var(--accent-orange); }
.tag-tol { background: rgba(101,109,118,0.1); color: var(--text-secondary); }
.tag-kb { background: rgba(26,127,55,0.1); color: var(--accent-green); }

/* Condition text */
.condition-text { font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; color: var(--text-secondary); line-height: 1.5; }
.condition-text code { background: rgba(9,105,218,0.08); padding: 1px 5px; border-radius: 3px; color: var(--accent-blue); font-size: 0.75rem; }

/* Detail Panel */
.detail-panel { position: sticky; top: 20px; height: fit-content; }
.detail-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; }
.detail-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 4px; }
.detail-id { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 16px; font-family: monospace; }
.detail-section { margin-bottom: 16px; }
.detail-label { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 6px; font-weight: 500; }
.detail-value { font-size: 0.9rem; line-height: 1.6; }
.detail-code { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 12px; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; line-height: 1.6; color: var(--text-secondary); overflow-x: auto; }
.detail-obligation { background: rgba(191,135,0,0.05); border: 1px solid rgba(191,135,0,0.2); border-radius: 6px; padding: 10px 12px; font-size: 0.85rem; color: var(--accent-orange); }

/* Stats */
.stats { display: flex; gap: 12px; margin-bottom: 16px; }
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; flex: 1; }
.stat-value { font-size: 1.4rem; font-weight: 600; }
.stat-label { font-size: 0.8rem; color: var(--text-muted); }

/* Responsive */
@media (max-width: 1200px) { .main-layout { grid-template-columns: 1fr; } .sidebar { position: static; display: flex; flex-wrap: wrap; gap: 4px; } }
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1><i class="ri ri-shield-check-line"></i> AgentForge · ABAC 权限策略配置</h1>
<p>基于属性的访问控制（Attribute-Based Access Control）策略管理</p>
</div>

<!-- Stats -->
<div class="stats">
<div class="stat-card">
<div class="stat-value" style="color: var(--accent-blue);">24</div>
<div class="stat-label">总策略数</div>
</div>
<div class="stat-card">
<div class="stat-value" style="color: var(--accent-green);">13</div>
<div class="stat-label">Allow</div>
</div>
<div class="stat-card">
<div class="stat-value" style="color: var(--accent-red);">7</div>
<div class="stat-label">Deny</div>
</div>
<div class="stat-card">
<div class="stat-value" style="color: var(--accent-orange);">4</div>
<div class="stat-label">需审批</div>
</div>
<div class="stat-card">
<div class="stat-value">6</div>
<div class="stat-label">资源类型</div>
</div>
</div>

<div class="main-layout">
<!-- Sidebar -->
<div class="sidebar">
<div class="sidebar-title">资源类型</div>
<div class="resource-item active" onclick="filterByType('all')">
<i class="ri ri-list-check"></i> 全部
<span class="resource-count">24</span>
</div>
<div class="resource-item" onclick="filterByType('workflow')">
<i class="ri ri-flow-chart"></i> 工作流
<span class="resource-count">9</span>
</div>
<div class="resource-item" onclick="filterByType('skill')">
<i class="ri ri-tools-line"></i> Skill
<span class="resource-count">3</span>
</div>
<div class="resource-item" onclick="filterByType('dataset')">
<i class="ri ri-database-2-line"></i> 数据集
<span class="resource-count">6</span>
</div>
<div class="resource-item" onclick="filterByType('tool')">
<i class="ri ri-hammer-line"></i> 工具/API
<span class="resource-count">4</span>
</div>
<div class="resource-item" onclick="filterByType('kb')">
<i class="ri ri-book-open-line"></i> 知识库
<span class="resource-count">3</span>
</div>
</div>

<!-- Table -->
<div class="table-wrapper">
<div class="table-header">
<div class="table-title">策略列表</div>
<div style="display: flex; gap: 8px;">
<select style="padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.85rem; background: var(--bg);" onchange="filterByDecision(this.value)">
<option value="all">全部决策</option>
<option value="allow">Allow</option>
<option value="deny">Deny</option>
<option value="approval">需审批</option>
</select>
</div>
</div>
<table class="table">
<thead>
<tr>
<th style="width: 100px;">策略ID</th>
<th style="width: 80px;">资源类型</th>
<th>策略名称</th>
<th style="width: 70px;">动作</th>
<th>条件</th>
<th style="width: 70px;">决策</th>
<th>附加义务</th>
</tr>
</thead>
<tbody id="policy-table">
</tbody>
</table>
</div>
</div>

<!-- Detail Panel -->
<div class="detail-panel">
<div class="detail-card" id="detail-card">
<div style="text-align: center; color: var(--text-muted); padding: 40px 0;">
<i class="ri ri-shield-check-line" style="font-size: 2rem; margin-bottom: 8px;"></i>
<div>点击策略查看详情</div>
</div>
</div>
</div>
</div>
</div>

<script>
const policies = [
    {
        id: "P-WF-005", type: "workflow", name: "工作流默认不可见", action: "read",
        condition: "<code>resource.visibility_scope = private</code> 且非 owner 且非租户管理员",
        decision: "deny", obligation: "默认私有，提示通过租户服务分享"
    },
    {
        id: "P-WF-006", type: "workflow", name: "租户服务分享后允许查看工作流", action: "read",
        condition: "存在有效 <code>tenant_share</code>，且包含 view 权限",
        decision: "allow", obligation: "记录分享访问来源"
    },
    {
        id: "P-WF-007", type: "workflow", name: "分享编辑范围允许编辑工作流", action: "edit",
        condition: "存在有效 <code>tenant_share</code>，且包含 edit 权限",
        decision: "allow", obligation: "记录编辑访问来源"
    },
    {
        id: "P-WF-008", type: "workflow", name: "行长可访问下辖机构工作流", action: "read",
        condition: "用户为行长/部门负责人，资源机构属于其管辖机构树",
        decision: "allow", obligation: "按机构树范围授权"
    },
    {
        id: "P-WF-009", type: "workflow", name: "禁止绕过租户服务转移工作流", action: "transfer",
        condition: "请求来源不是 <code>tenant_service</code>",
        decision: "deny", obligation: "记录安全事件"
    },
    {
        id: "P-WF-010", type: "workflow", name: "工作流转移需要租户管理员审批", action: "transfer",
        condition: "owner 发起，目标 owner 有效，且通过租户服务",
        decision: "approval", obligation: "租户管理员审批，透传资源服务"
    },
    {
        id: "P-WF-011", type: "workflow", name: "工作流审核角色可审核发布", action: "review",
        condition: "用户具备 <code>workflow_reviewer</code>，资源待审核，同租户",
        decision: "allow", obligation: "要求审核意见并记录日志"
    },
    {
        id: "P-WF-012", type: "workflow", name: "系统管理员设置工作流可见范围", action: "grant_permission",
        condition: "系统管理员通过租户服务设置 view/edit",
        decision: "allow", obligation: "写入租户 ACL，透传工作流服务"
    },
    {
        id: "P-WF-013", type: "workflow", name: "工作流可见范围并发修改冲突拒绝", action: "grant_permission",
        condition: "请求 <code>acl_version</code> 小于资源当前版本",
        decision: "deny", obligation: "要求刷新最新 ACL 快照"
    },
    {
        id: "P-SK-004", type: "skill", name: "Skill 默认不可见", action: "read",
        condition: "私有资源，非 owner，且无分享授权",
        decision: "deny", obligation: "默认私有，提示配置可见范围"
    },
    {
        id: "P-SK-005", type: "skill", name: "系统管理员设置 Skill 可见范围", action: "grant_permission",
        condition: "系统管理员通过租户服务设置 view/edit",
        decision: "allow", obligation: "写入租户 ACL，透传 Skill 服务"
    },
    {
        id: "P-SK-006", type: "skill", name: "Skill 审核角色可审核发布", action: "review",
        condition: "用户具备 <code>skill_reviewer</code>，资源待审核，同租户",
        decision: "allow", obligation: "要求审核意见并记录日志"
    },
    {
        id: "P-DS-004", type: "dataset", name: "数据集默认不可见", action: "read",
        condition: "私有资源，非 owner，且无分享授权",
        decision: "deny", obligation: "默认私有，提示通过租户服务分享"
    },
    {
        id: "P-DS-005", type: "dataset", name: "租户服务分享后允许查看数据集", action: "read",
        condition: "存在有效 <code>tenant_share</code>，且包含 view 权限",
        decision: "allow", obligation: "按数据等级脱敏，记录分享访问"
    },
    {
        id: "P-DS-006", type: "dataset", name: "系统管理员查询用户跨服务数据权限", action: "query_permission",
        condition: "系统管理员查询同租户用户权限",
        decision: "allow", obligation: "返回数据集、工作流、Skill 数量摘要"
    },
    {
        id: "P-DS-007", type: "dataset", name: "系统管理员调整用户数据权限并透传", action: "grant_permission",
        condition: "系统管理员通过租户服务设置 view/edit",
        decision: "allow", obligation: "写入租户 ACL，透传各业务服务"
    },
    {
        id: "P-DS-008", type: "dataset", name: "禁止业务服务本地修改数据权限", action: "grant_permission",
        condition: "请求来源不是 <code>tenant_service</code>",
        decision: "deny", obligation: "租户服务作为权限唯一权威源"
    },
    {
        id: "P-DS-009", type: "dataset", name: "行长多部门数据集权限汇总", action: "read",
        condition: "行长/负责人管辖机构与资源机构路径有交集",
        decision: "allow", obligation: "返回按机构树聚合的权限摘要"
    },
    {
        id: "P-TOL-003", type: "tool", name: "租户权限管理 API 仅管理员可调用", action: "call",
        condition: "系统管理员，从管理控制台发起，同租户",
        decision: "allow", obligation: "要求 MFA，记录管理员操作"
    },
    {
        id: "P-TOL-004", type: "tool", name: "资源分享转移 API 只接受租户服务", action: "call",
        condition: "请求来源不是 <code>tenant_service</code>",
        decision: "deny", obligation: "拒绝绕过租户服务"
    },
    {
        id: "P-TOL-005", type: "tool", name: "管理员在线查询各服务数据权限", action: "call",
        condition: "系统管理员查询同租户用户，通过租户服务",
        decision: "allow", obligation: "扇出查询工作流、数据集、Skill、知识库"
    },
    {
        id: "P-TOL-006", type: "tool", name: "普通用户仅查询本人权限摘要", action: "call",
        condition: "查询目标用户等于当前用户，响应模式为 summary",
        decision: "allow", obligation: "隐藏管理员字段"
    },
    {
        id: "P-KB-003", type: "kb", name: "知识库默认不可见", action: "read",
        condition: "私有资源，非 owner，且无分享授权",
        decision: "deny", obligation: "默认私有，提示配置可见范围"
    },
    {
        id: "P-KB-004", type: "kb", name: "机构上下级继承知识库可见范围", action: "read",
        condition: "可见范围为机构树，用户机构是可见机构下级",
        decision: "allow", obligation: "按机构树读取，要求引用来源"
    },
    {
        id: "P-KB-005", type: "kb", name: "知识库审核角色可审核发布", action: "review",
        condition: "用户具备 <code>knowledge_reviewer</code>，资源待审核，同租户",
        decision: "allow", obligation: "要求审核意见并记录日志"
    }
];

const typeLabels = {
    workflow: { label: "工作流", class: "tag-wf" },
    skill: { label: "Skill", class: "tag-skill" },
    dataset: { label: "数据集", class: "tag-ds" },
    tool: { label: "工具/API", class: "tag-tol" },
    kb: { label: "知识库", class: "tag-kb" }
};

const decisionLabels = {
    allow: { label: "allow", class: "tag-allow" },
    deny: { label: "deny", class: "tag-deny" },
    approval: { label: "approval_required", class: "tag-approval" }
};

let currentTypeFilter = "all";
let currentDecisionFilter = "all";
let selectedPolicy = null;

function renderTable() {
    const tbody = document.getElementById("policy-table");
    const filtered = policies.filter(p => {
        if (currentTypeFilter !== "all" && p.type !== currentTypeFilter) return false;
        if (currentDecisionFilter !== "all" && p.decision !== currentDecisionFilter) return false;
        return true;
    });

    tbody.innerHTML = filtered.map(p => `
        <tr onclick="selectPolicy('${p.id}')" class="${selectedPolicy === p.id ? 'selected' : ''}">
            <td><code style="font-size: 0.8rem; color: var(--text-muted);">${p.id}</code></td>
            <td><span class="tag ${typeLabels[p.type].class}">${typeLabels[p.type].label}</span></td>
            <td style="font-weight: 500;">${p.name}</td>
            <td><code style="font-size: 0.8rem;">${p.action}</code></td>
            <td class="condition-text">${p.condition}</td>
            <td><span class="tag ${decisionLabels[p.decision].class}">${decisionLabels[p.decision].label}</span></td>
            <td style="font-size: 0.82rem; color: var(--text-secondary);">${p.obligation}</td>
        </tr>
    `).join("");
}

function filterByType(type) {
    currentTypeFilter = type;
    document.querySelectorAll(".resource-item").forEach(el => el.classList.remove("active"));
    event.currentTarget.classList.add("active");
    renderTable();
}

function filterByDecision(decision) {
    currentDecisionFilter = decision;
    renderTable();
}

function selectPolicy(id) {
    selectedPolicy = id;
    const p = policies.find(x => x.id === id);
    if (!p) return;

    const card = document.getElementById("detail-card");
    card.innerHTML = `
        <div class="detail-title">${p.name}</div>
        <div class="detail-id">${p.id}</div>
        
        <div class="detail-section">
            <div class="detail-label">资源类型</div>
            <div class="detail-value"><span class="tag ${typeLabels[p.type].class}">${typeLabels[p.type].label}</span></div>
        </div>
        
        <div class="detail-section">
            <div class="detail-label">动作</div>
            <div class="detail-value"><code>${p.action}</code></div>
        </div>
        
        <div class="detail-section">
            <div class="detail-label">决策</div>
            <div class="detail-value"><span class="tag ${decisionLabels[p.decision].class}" style="font-size: 0.9rem;">${decisionLabels[p.decision].label}</span></div>
        </div>
        
        <div class="detail-section">
            <div class="detail-label">条件</div>
            <div class="detail-code">${p.condition}</div>
        </div>
        
        <div class="detail-section">
            <div class="detail-label">附加义务</div>
            <div class="detail-obligation">${p.obligation}</div>
        </div>
    `;

    renderTable();
}

// Initial render
renderTable();
</script>
</body>
</html>
