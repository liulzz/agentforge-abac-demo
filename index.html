<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentForge · ABAC 策略配置</title>
<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
<style>
:root {
    --bg: #f6f8fa; --bg-secondary: #ffffff; --card: #ffffff;
    --border: #d0d7de; --text: #1f2328; --text-secondary: #656d76; --text-muted: #8b949e;
    --accent-blue: #0969da; --accent-green: #1a7f37; --accent-orange: #bf8700;
    --accent-red: #cf222e; --accent-purple: #8250df;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 14px; }
.container { max-width: 1600px; margin: 0 auto; padding: 20px; }
.header { padding: 16px 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
.header h1 { font-size: 1.4rem; display: flex; align-items: center; gap: 10px; }
.header h1 i { color: var(--accent-blue); }
.main-layout { display: grid; grid-template-columns: 280px 1fr 360px; gap: 16px; }

/* Left - Policy List */
.policy-list { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.list-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.list-title { font-weight: 600; font-size: 0.95rem; }
.list-filter { padding: 10px 16px; border-bottom: 1px solid var(--border); }
.list-filter select { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.85rem; background: var(--bg); }
.list-items { max-height: 600px; overflow-y: auto; }
.list-item { padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; }
.list-item:hover { background: rgba(9,105,218,0.04); }
.list-item.active { background: rgba(9,105,218,0.08); border-left: 3px solid var(--accent-blue); }
.list-item-id { font-size: 0.75rem; color: var(--text-muted); font-family: monospace; }
.list-item-name { font-size: 0.9rem; font-weight: 500; margin-top: 2px; }
.list-item-meta { display: flex; gap: 8px; margin-top: 6px; }

/* Tags */
.tag { display: inline-flex; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 500; }
.tag-allow { background: rgba(26,127,55,0.1); color: var(--accent-green); }
.tag-deny { background: rgba(208,34,46,0.1); color: var(--accent-red); }
.tag-approval { background: rgba(191,135,0,0.1); color: var(--accent-orange); }
.tag-type { background: rgba(9,105,218,0.1); color: var(--accent-blue); }

/* Center - Form */
.form-panel { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 24px; }
.form-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-group { margin-bottom: 16px; }
.form-group.full { grid-column: span 2; }
.form-label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 6px; font-weight: 500; }
.form-input, .form-select, .form-textarea {
    width: 100%; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-size: 0.9rem; transition: border-color 0.2s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--accent-blue); }
.form-textarea { min-height: 80px; resize: vertical; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; }
.form-hint { font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; }

/* Condition Builder */
.condition-builder { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
.condition-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
.condition-row select, .condition-row input { padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.85rem; background: var(--card); }
.condition-row .attr-select { width: 180px; }
.condition-row .op-select { width: 100px; }
.condition-row .value-input { flex: 1; }
.condition-row .remove-btn { background: none; border: none; color: var(--accent-red); cursor: pointer; font-size: 1.1rem; padding: 4px; }
.add-condition { display: flex; align-items: center; gap: 6px; color: var(--accent-blue); cursor: pointer; font-size: 0.85rem; padding: 6px 0; }
.add-condition:hover { text-decoration: underline; }

/* Buttons */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 16px; border-radius: 6px; font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: all 0.15s; border: none; }
.btn-primary { background: var(--accent-blue); color: #fff; }
.btn-primary:hover { background: #0860c7; }
.btn-secondary { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--border); }
.btn-danger { background: rgba(208,34,46,0.1); color: var(--accent-red); }
.btn-danger:hover { background: rgba(208,34,46,0.2); }
.btn-group { display: flex; gap: 8px; margin-top: 20px; }

/* Right - Preview */
.preview-panel { position: sticky; top: 20px; height: fit-content; }
.preview-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.preview-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.preview-title { font-weight: 600; font-size: 0.95rem; }
.preview-body { padding: 16px; }
.preview-json { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 14px; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; line-height: 1.6; color: var(--text-secondary); overflow-x: auto; max-height: 500px; overflow-y: auto; }
.preview-actions { padding: 14px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; }

/* Empty State */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.empty-state i { font-size: 3rem; margin-bottom: 12px; }
.empty-state p { font-size: 0.9rem; }

/* Modal */
.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 100; }
.modal-overlay.show { display: flex; }
.modal { background: var(--card); border-radius: 12px; padding: 24px; width: 500px; max-width: 90vw; }
.modal-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1><i class="ri ri-shield-check-line"></i> AgentForge · ABAC 策略配置</h1>
<div class="btn-group">
<button class="btn btn-primary" onclick="createNewPolicy()"><i class="ri ri-add-line"></i> 新建策略</button>
<button class="btn btn-secondary" onclick="exportAllPolicies()"><i class="ri ri-download-line"></i> 导出全部</button>
</div>
</div>

<div class="main-layout">
<!-- Left - Policy List -->
<div class="policy-list">
<div class="list-header">
<div class="list-title">策略列表</div>
<span style="font-size: 0.85rem; color: var(--text-muted);" id="policy-count">0 条</span>
</div>
<div class="list-filter">
<select id="type-filter" onchange="renderPolicyList()">
<option value="all">全部资源类型</option>
<option value="workflow">工作流</option>
<option value="skill">Skill</option>
<option value="dataset">数据集</option>
<option value="tool">工具/API</option>
<option value="kb">知识库</option>
</select>
</div>
<div class="list-items" id="policy-list-items"></div>
</div>

<!-- Center - Form -->
<div class="form-panel" id="form-panel">
<div class="empty-state" id="empty-state">
<i class="ri ri-file-edit-line"></i>
<p>选择左侧策略编辑<br>或点击「新建策略」</p>
</div>
<div id="policy-form" style="display: none;">
<div class="form-title">
<span id="form-title-text">编辑策略</span>
<span style="font-size: 0.8rem; color: var(--text-muted);" id="form-policy-id"></span>
</div>

<div class="form-grid">
<div class="form-group">
<label class="form-label">策略ID</label>
<input type="text" class="form-input" id="input-id" placeholder="如: P-WF-001">
</div>
<div class="form-group">
<label class="form-label">资源类型</label>
<select class="form-select" id="input-type">
<option value="workflow">工作流</option>
<option value="skill">Skill</option>
<option value="dataset">数据集</option>
<option value="tool">工具/API</option>
<option value="kb">知识库</option>
</select>
</div>
<div class="form-group full">
<label class="form-label">策略名称</label>
<input type="text" class="form-input" id="input-name" placeholder="简明描述策略意图">
</div>
<div class="form-group">
<label class="form-label">动作</label>
<select class="form-select" id="input-action">
<option value="read">read（读取）</option>
<option value="edit">edit（编辑）</option>
<option value="transfer">transfer（转移）</option>
<option value="review">review（审核）</option>
<option value="grant_permission">grant_permission（授权）</option>
<option value="query_permission">query_permission（查询权限）</option>
<option value="call">call（调用）</option>
</select>
</div>
<div class="form-group">
<label class="form-label">决策</label>
<select class="form-select" id="input-decision">
<option value="allow">allow（允许）</option>
<option value="deny">deny（拒绝）</option>
<option value="approval_required">approval_required（需审批）</option>
</select>
</div>
<div class="form-group full">
<label class="form-label">条件配置</label>
<div class="condition-builder" id="condition-builder"></div>
<div class="add-condition" onclick="addConditionRow()">
<i class="ri ri-add-circle-line"></i> 添加条件
</div>
</div>
<div class="form-group full">
<label class="form-label">附加义务</label>
<textarea class="form-textarea" id="input-obligation" placeholder="策略生效时需要执行的附加操作，如：记录日志、要求审批等"></textarea>
</div>
</div>

<div class="btn-group">
<button class="btn btn-primary" onclick="savePolicy()"><i class="ri ri-save-line"></i> 保存策略</button>
<button class="btn btn-danger" onclick="deletePolicy()"><i class="ri ri-delete-bin-line"></i> 删除</button>
<button class="btn btn-secondary" onclick="cancelEdit()">取消</button>
</div>
</div>
</div>

<!-- Right - Preview -->
<div class="preview-panel">
<div class="preview-card">
<div class="preview-header">
<div class="preview-title">策略预览 (SQL)</div>
<button class="btn btn-secondary" style="padding: 6px 10px; font-size: 0.8rem;" onclick="copyJSON()">
<i class="ri ri-file-copy-line"></i> 复制
</button>
</div>
<div class="preview-body">
<pre class="preview-json" id="preview-json">// 选择或新建策略以预览</pre>
</div>
</div>

<div class="preview-card" style="margin-top: 16px;">
<div class="preview-header">
<div class="preview-title">已配置策略统计</div>
</div>
<div class="preview-body">
<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
<div style="text-align: center; padding: 12px; background: rgba(26,127,55,0.05); border-radius: 8px;">
<div style="font-size: 1.5rem; font-weight: 600; color: var(--accent-green);" id="stat-allow">0</div>
<div style="font-size: 0.8rem; color: var(--text-muted);">Allow</div>
</div>
<div style="text-align: center; padding: 12px; background: rgba(208,34,46,0.05); border-radius: 8px;">
<div style="font-size: 1.5rem; font-weight: 600; color: var(--accent-red);" id="stat-deny">0</div>
<div style="font-size: 0.8rem; color: var(--text-muted);">Deny</div>
</div>
<div style="text-align: center; padding: 12px; background: rgba(191,135,0,0.05); border-radius: 8px;">
<div style="font-size: 1.5rem; font-weight: 600; color: var(--accent-orange);" id="stat-approval">0</div>
<div style="font-size: 0.8rem; color: var(--text-muted);">需审批</div>
</div>
<div style="text-align: center; padding: 12px; background: rgba(9,105,218,0.05); border-radius: 8px;">
<div style="font-size: 1.5rem; font-weight: 600; color: var(--accent-blue);" id="stat-total">0</div>
<div style="font-size: 0.8rem; color: var(--text-muted);">总计</div>
</div>
</div>
</div>
</div>
</div>
</div>
</div>

<!-- Import Modal -->
<div class="modal-overlay" id="import-modal">
<div class="modal">
<div class="modal-title">导入策略配置</div>
<div class="form-group">
<textarea class="form-textarea" id="import-json" style="min-height: 200px;" placeholder="粘贴 JSON 配置..."></textarea>
</div>
<div class="btn-group">
<button class="btn btn-primary" onclick="doImport()">导入</button>
<button class="btn btn-secondary" onclick="closeModal()">取消</button>
</div>
</div>
</div>

<script>
let policies = [];
let editingIndex = -1;

// 预置示例策略
const samplePolicies = [
    { id: "P-WF-005", type: "workflow", name: "工作流默认不可见", action: "read", conditions: [{ attr: "resource.visibility_scope", op: "=", value: "private" }, { attr: "requester.is_owner", op: "!=", value: "true" }, { attr: "requester.is_tenant_admin", op: "!=", value: "true" }], decision: "deny", obligation: "默认私有，提示通过租户服务分享" },
    { id: "P-WF-006", type: "workflow", name: "租户服务分享后允许查看工作流", action: "read", conditions: [{ attr: "tenant_share.valid", op: "=", value: "true" }, { attr: "tenant_share.permissions", op: "contains", value: "view" }], decision: "allow", obligation: "记录分享访问来源" },
    { id: "P-WF-008", type: "workflow", name: "行长可访问下辖机构工作流", action: "read", conditions: [{ attr: "requester.role", op: "in", value: "branch_manager,dept_head" }, { attr: "resource.org_path", op: "under", value: "requester.managed_org_tree" }], decision: "allow", obligation: "按机构树范围授权" },
    { id: "P-WF-009", type: "workflow", name: "禁止绕过租户服务转移工作流", action: "transfer", conditions: [{ attr: "request.source", op: "!=", value: "tenant_service" }], decision: "deny", obligation: "记录安全事件" },
    { id: "P-WF-010", type: "workflow", name: "工作流转移需要租户管理员审批", action: "transfer", conditions: [{ attr: "requester.is_owner", op: "=", value: "true" }, { attr: "transfer.target_valid", op: "=", value: "true" }, { attr: "request.source", op: "=", value: "tenant_service" }], decision: "approval_required", obligation: "租户管理员审批，透传资源服务" },
    { id: "P-WF-011", type: "workflow", name: "工作流审核角色可审核发布", action: "review", conditions: [{ attr: "requester.roles", op: "contains", value: "workflow_reviewer" }, { attr: "resource.status", op: "=", value: "pending_review" }, { attr: "resource.tenant_id", op: "=", value: "requester.tenant_id" }], decision: "allow", obligation: "要求审核意见并记录日志" },
    { id: "P-SK-004", type: "skill", name: "Skill 默认不可见", action: "read", conditions: [{ attr: "resource.visibility", op: "=", value: "private" }, { attr: "requester.is_owner", op: "!=", value: "true" }, { attr: "share_granted", op: "=", value: "false" }], decision: "deny", obligation: "默认私有，提示配置可见范围" },
    { id: "P-SK-006", type: "skill", name: "Skill 审核角色可审核发布", action: "review", conditions: [{ attr: "requester.roles", op: "contains", value: "skill_reviewer" }, { attr: "resource.status", op: "=", value: "pending_review" }, { attr: "resource.tenant_id", op: "=", value: "requester.tenant_id" }], decision: "allow", obligation: "要求审核意见并记录日志" },
    { id: "P-DS-004", type: "dataset", name: "数据集默认不可见", action: "read", conditions: [{ attr: "resource.visibility", op: "=", value: "private" }, { attr: "requester.is_owner", op: "!=", value: "true" }, { attr: "share_granted", op: "=", value: "false" }], decision: "deny", obligation: "默认私有，提示通过租户服务分享" },
    { id: "P-DS-005", type: "dataset", name: "租户服务分享后允许查看数据集", action: "read", conditions: [{ attr: "tenant_share.valid", op: "=", value: "true" }, { attr: "tenant_share.permissions", op: "contains", value: "view" }], decision: "allow", obligation: "按数据等级脱敏，记录分享访问" },
    { id: "P-DS-008", type: "dataset", name: "禁止业务服务本地修改数据权限", action: "grant_permission", conditions: [{ attr: "request.source", op: "!=", value: "tenant_service" }], decision: "deny", obligation: "租户服务作为权限唯一权威源" },
    { id: "P-TOL-003", type: "tool", name: "租户权限管理 API 仅管理员可调用", action: "call", conditions: [{ attr: "requester.is_system_admin", op: "=", value: "true" }, { attr: "request.source", op: "=", value: "admin_console" }, { attr: "requester.tenant_id", op: "=", value: "resource.tenant_id" }], decision: "allow", obligation: "要求 MFA，记录管理员操作" },
    { id: "P-TOL-006", type: "tool", name: "普通用户仅查询本人权限摘要", action: "call", conditions: [{ attr: "query.target_user", op: "=", value: "requester.user_id" }, { attr: "response.mode", op: "=", value: "summary" }], decision: "allow", obligation: "隐藏管理员字段" },
    { id: "P-KB-003", type: "kb", name: "知识库默认不可见", action: "read", conditions: [{ attr: "resource.visibility", op: "=", value: "private" }, { attr: "requester.is_owner", op: "!=", value: "true" }, { attr: "share_granted", op: "=", value: "false" }], decision: "deny", obligation: "默认私有，提示配置可见范围" },
    { id: "P-KB-004", type: "kb", name: "机构上下级继承知识库可见范围", action: "read", conditions: [{ attr: "resource.visibility_scope", op: "=", value: "org_tree" }, { attr: "requester.org_path", op: "under", value: "resource.visible_org_paths" }], decision: "allow", obligation: "按机构树读取，要求引用来源" }
];

// Initialize
policies = [...samplePolicies];
renderPolicyList();
updateStats();

function renderPolicyList() {
    const filter = document.getElementById('type-filter').value;
    const filtered = filter === 'all' ? policies : policies.filter(p => p.type === filter);
    
    const container = document.getElementById('policy-list-items');
    container.innerHTML = filtered.map((p, i) => {
        const realIndex = policies.indexOf(p);
        return `<div class="list-item ${realIndex === editingIndex ? 'active' : ''}" onclick="selectPolicy(${realIndex})">
            <div class="list-item-id">${p.id}</div>
            <div class="list-item-name">${p.name}</div>
            <div class="list-item-meta">
                <span class="tag tag-type">${getTypeLabel(p.type)}</span>
                <span class="tag ${p.decision === 'allow' ? 'tag-allow' : p.decision === 'deny' ? 'tag-deny' : 'tag-approval'}">${p.decision}</span>
            </div>
        </div>`;
    }).join('');
    
    document.getElementById('policy-count').textContent = `${filtered.length} 条`;
}

function getTypeLabel(type) {
    const labels = { workflow: '工作流', skill: 'Skill', dataset: '数据集', tool: '工具/API', kb: '知识库' };
    return labels[type] || type;
}

function selectPolicy(index) {
    editingIndex = index;
    const p = policies[index];
    
    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('policy-form').style.display = 'block';
    document.getElementById('form-title-text').textContent = '编辑策略';
    
    document.getElementById('input-id').value = p.id;
    document.getElementById('input-type').value = p.type;
    document.getElementById('input-name').value = p.name;
    document.getElementById('input-action').value = p.action;
    document.getElementById('input-decision').value = p.decision;
    document.getElementById('input-obligation').value = p.obligation;
    
    renderConditions(p.conditions);
    updatePreview();
    renderPolicyList();
}

function createNewPolicy() {
    editingIndex = -1;
    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('policy-form').style.display = 'block';
    document.getElementById('form-title-text').textContent = '新建策略';
    
    document.getElementById('input-id').value = '';
    document.getElementById('input-type').value = 'workflow';
    document.getElementById('input-name').value = '';
    document.getElementById('input-action').value = 'read';
    document.getElementById('input-decision').value = 'allow';
    document.getElementById('input-obligation').value = '';
    
    renderConditions([]);
    updatePreview();
    renderPolicyList();
}

function renderConditions(conditions) {
    const container = document.getElementById('condition-builder');
    container.innerHTML = conditions.map((c, i) => `
        <div class="condition-row">
            <select class="attr-select" onchange="updateCondition(${i}, 'attr', this.value)">
                ${getAttrOptions(c.attr)}
            </select>
            <select class="op-select" onchange="updateCondition(${i}, 'op', this.value)">
                ${getOpOptions(c.op)}
            </select>
            <input class="value-input" value="${c.value}" placeholder="值" onchange="updateCondition(${i}, 'value', this.value)">
            <button class="remove-btn" onclick="removeCondition(${i})"><i class="ri ri-close-line"></i></button>
        </div>
    `).join('');
}

function getAttrOptions(selected) {
    const attrs = [
        'resource.visibility', 'resource.visibility_scope', 'resource.status', 'resource.tenant_id', 'resource.org_path', 'resource.data_level',
        'requester.is_owner', 'requester.is_tenant_admin', 'requester.is_system_admin', 'requester.role', 'requester.roles', 'requester.tenant_id', 'requester.user_id', 'requester.org_path',
        'request.source', 'request.acl_version',
        'tenant_share.valid', 'tenant_share.permissions',
        'transfer.target_valid', 'share_granted', 'query.target_user', 'response.mode'
    ];
    return attrs.map(a => `<option value="${a}" ${a === selected ? 'selected' : ''}>${a}</option>`).join('');
}

function getOpOptions(selected) {
    const ops = ['=', '!=', 'contains', 'in', 'not_in', 'under', '>', '<', '>=', '<='];
    return ops.map(o => `<option value="${o}" ${o === selected ? 'selected' : ''}>${o}</option>`).join('');
}

function addConditionRow() {
    const p = getCurrentPolicyData();
    p.conditions.push({ attr: 'resource.visibility', op: '=', value: '' });
    renderConditions(p.conditions);
    updatePreview();
}

function updateCondition(index, field, value) {
    if (editingIndex >= 0) {
        policies[editingIndex].conditions[index][field] = value;
    }
    updatePreview();
}

function removeCondition(index) {
    const p = getCurrentPolicyData();
    p.conditions.splice(index, 1);
    renderConditions(p.conditions);
    updatePreview();
}

function getCurrentPolicyData() {
    if (editingIndex >= 0) return policies[editingIndex];
    return {
        id: document.getElementById('input-id').value,
        type: document.getElementById('input-type').value,
        name: document.getElementById('input-name').value,
        action: document.getElementById('input-action').value,
        decision: document.getElementById('input-decision').value,
        obligation: document.getElementById('input-obligation').value,
        conditions: []
    };
}

function savePolicy() {
    const data = {
        id: document.getElementById('input-id').value.trim(),
        type: document.getElementById('input-type').value,
        name: document.getElementById('input-name').value.trim(),
        action: document.getElementById('input-action').value,
        decision: document.getElementById('input-decision').value,
        obligation: document.getElementById('input-obligation').value.trim(),
        conditions: editingIndex >= 0 ? policies[editingIndex].conditions : []
    };
    
    if (!data.id || !data.name) {
        alert('请填写策略ID和名称');
        return;
    }
    
    if (editingIndex >= 0) {
        policies[editingIndex] = data;
    } else {
        policies.push(data);
    }
    
    renderPolicyList();
    updateStats();
    alert('策略已保存');
}

function deletePolicy() {
    if (editingIndex < 0) return;
    if (!confirm('确定删除此策略？')) return;
    
    policies.splice(editingIndex, 1);
    editingIndex = -1;
    document.getElementById('empty-state').style.display = 'block';
    document.getElementById('policy-form').style.display = 'none';
    renderPolicyList();
    updateStats();
}

function cancelEdit() {
    editingIndex = -1;
    document.getElementById('empty-state').style.display = 'block';
    document.getElementById('policy-form').style.display = 'none';
    renderPolicyList();
}

function updatePreview() {
    const p = getCurrentPolicyData();
    
    // Build SQL preview
    const conditions = (p.conditions || []);
    const whereClauses = conditions.map(c => {
        const val = c.value.startsWith('requester.') || c.value.startsWith('resource.') || c.value.startsWith('request.') || c.value.startsWith('tenant_share.') 
            ? c.value : `'${c.value}'`;
        
        switch(c.op) {
            case '=': return `${c.attr} = ${val}`;
            case '!=': return `${c.attr} != ${val}`;
            case 'contains': return `${c.attr} CONTAINS ${val}`;
            case 'in': return `${c.attr} IN (${c.value.split(',').map(v => `'${v.trim()}'`).join(', ')})`;
            case 'not_in': return `${c.attr} NOT IN (${c.value.split(',').map(v => `'${v.trim()}'`).join(', ')})`;
            case 'under': return `${c.attr} UNDER ${val}`;
            case '>': return `${c.attr} > ${val}`;
            case '<': return `${c.attr} < ${val}`;
            case '>=': return `${c.attr} >= ${val}`;
            case '<=': return `${c.attr} <= ${val}`;
            default: return `${c.attr} ${c.op} ${val}`;
        }
    });
    
    const decisionMap = { 'allow': 'ALLOW', 'deny': 'DENY', 'approval_required': 'APPROVAL_REQUIRED' };
    const actionMap = { 'read': 'READ', 'edit': 'EDIT', 'transfer': 'TRANSFER', 'review': 'REVIEW', 'grant_permission': 'GRANT_PERMISSION', 'query_permission': 'QUERY_PERMISSION', 'call': 'CALL' };
    
    let sql = `-- 策略: ${p.name || '策略名称'}\n`;
    sql += `-- 策略ID: ${p.id || 'P-XXX-000'}\n`;
    sql += `-- 资源类型: ${getTypeLabel(p.type)}\n\n`;
    sql += `CREATE POLICY ${p.id || 'policy_id'}\n`;
    sql += `  ON ${p.type}_resources\n`;
    sql += `  FOR ${actionMap[p.action] || p.action.toUpperCase()}\n`;
    sql += `  USING (\n`;
    
    if (whereClauses.length === 0) {
    sql += `    -- 无条件\n`;
    } else {
    sql += whereClauses.map(c => `    ${c}`).join('\n AND\n');
    }
    
    sql += `\n  )\n`;
    sql += `  ${decisionMap[p.decision] || p.decision.toUpperCase()}`;
    
    if (p.obligation) {
    sql += `\n  -- 附加义务: ${p.obligation}`;
    }
    
    document.getElementById('preview-json').textContent = sql;
}

function updateStats() {
    document.getElementById('stat-total').textContent = policies.length;
    document.getElementById('stat-allow').textContent = policies.filter(p => p.decision === 'allow').length;
    document.getElementById('stat-deny').textContent = policies.filter(p => p.decision === 'deny').length;
    document.getElementById('stat-approval').textContent = policies.filter(p => p.decision === 'approval_required').length;
}

function copyJSON() {
    navigator.clipboard.writeText(document.getElementById('preview-json').textContent);
    alert('已复制到剪贴板');
}

function exportAllPolicies() {
    const data = JSON.stringify(policies, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'abac-policies.json';
    a.click();
    URL.revokeObjectURL(url);
}

function closeModal() {
    document.getElementById('import-modal').classList.remove('show');
}
</script>
